name: AI PR Review (kimi-k2.5)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
          DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt)
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          # Truncate to ~60K chars to stay within model context
          if [ "$DIFF_SIZE" -gt 60000 ]; then
            head -c 60000 /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
            echo -e "\n\n[... diff truncated at 60KB ...]" >> /tmp/pr-diff-truncated.txt
            mv /tmp/pr-diff-truncated.txt /tmp/pr-diff.txt
          fi

      - name: Skip if empty diff
        if: steps.diff.outputs.diff_size == '0'
        run: echo "Empty diff, skipping review" && exit 0

      - name: Call kimi-k2.5 for review
        id: review
        env:
          ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr-diff.txt)

          # Build JSON payload safely with Python
          python3 -c "
          import json, sys, os

          diff = open('/tmp/pr-diff.txt').read()
          pr_title = os.environ.get('PR_TITLE', '')
          pr_body = os.environ.get('PR_BODY', '')

          system_prompt = '''You are a senior code reviewer. Review this pull request diff for:
          1. Logic errors or bugs
          2. Security vulnerabilities (RLS bypass, secrets in code, injection, auth issues)
          3. Performance issues (N+1 queries, memory leaks, missing indexes, timeouts)
          4. Edge cases not handled
          5. Data validation gaps

          Rules:
          - Be concise. Only flag real issues, not style preferences.
          - Classify each finding as CRITICAL, HIGH, MEDIUM, or LOW.
          - If the code looks good, say so briefly.
          - Format your response in markdown.
          - Start with a one-line summary verdict.
          - Do NOT repeat the diff back.'''

          user_msg = f'PR: {pr_title}\n\nDescription: {pr_body}\n\nDiff:\n{diff}'

          payload = {
              'model': 'kimi-k2.5',
              'max_tokens': 3000,
              'messages': [
                  {'role': 'system', 'content': system_prompt},
                  {'role': 'user', 'content': user_msg}
              ]
          }

          with open('/tmp/payload.json', 'w') as f:
              json.dump(payload, f)
          "

          RESPONSE=$(curl -s -m 90 \
            "https://coding-intl.dashscope.aliyuncs.com/v1/chat/completions" \
            -H "Authorization: Bearer $ALIBABA_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          # Extract content
          REVIEW=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              r = json.load(sys.stdin)
              content = r['choices'][0]['message']['content']
              print(content)
          except Exception as e:
              print(f'Review failed: {e}')
              print('Raw response (first 500 chars):')
              sys.stdin.seek(0)
              print(sys.stdin.read()[:500])
          ")

          # Save to file (avoid delimiter issues)
          echo "$REVIEW" > /tmp/review-output.txt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review-output.txt)
          COMMENT="## AI Code Review (kimi-k2.5)

          $REVIEW

          ---
          *Automated review via [Alibaba Coding Plan](https://help.aliyun.com/). Not a substitute for human review.*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
